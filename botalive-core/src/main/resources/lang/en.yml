# ============================================================================
#  BotAlive – bot phrases (English)
#
#  To translate into another language:
#    1. Copy this file to plugins/BotAlive/lang/<code>.yml
#       (e.g. de.yml) and translate the contents.
#    2. Set chat.language: <code> in config.yml.
#  Any category this file does not define (or leaves empty) automatically
#  falls back to the built-in layer – an incomplete translation never
#  leaves the bots speechless.
#
#  {name} is replaced with the other party's name (may end up empty).
#  patterns.* are regular expressions (case-insensitive, full Unicode) used
#  to recognize greetings/thanks in incoming messages.
# ============================================================================

patterns:
  greeting: '\b(hi|hello|hey|heya|hiya|yo|sup|howdy)\b'
  thanks: '\b(thanks|thank you|thx|ty|cheers|thankyou)\b'
  what-doing: 'what\s+(are\s+you|r\s+u|ya)\s+(doing|up\s+to)|whatcha\s+doin|wyd\b'
  where-are-you: 'where\s+(are\s+you|r\s+u|you\s+at)|where\s+can\s+i\s+find\s+you'
  what-have: 'what\s+(do\s+you|u)\s+(have|got)|what\s+are\s+you\s+carrying|inv\?'
  where-village: 'where\s+is\s+(the\s+|a\s+)?(nearest\s+)?village|know\s+a\s+village'
  come-here: 'come\s+(here|to\s+me|with\s+me)|follow\s+me'
  give-food: 'give\s+me\s+(some\s+)?food|got\s+(any\s+)?food|feed\s+me|toss\s+me\s+food'
  help: '\b(help(\s+me)?|save\s+me|sos|assist)\b'
  give-item: '\b(give|toss|throw|lend|spare)\s+me\b|\bgot\s+(any|some|spare)\b|\bi\s+need\b|\bcan\s+i\s+(have|get)\b'
  market-buy: '\b(i(''|’)?ll\s+take\s+(it|that)|i(''|’)?ll\s+buy|buying|sold|take\s+it|i\s+want\s+(it|that|to\s+buy))\b'

# Item aliases for "give me ..." requests – key is a word from the message
