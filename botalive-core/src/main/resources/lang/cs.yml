# ============================================================================
#  BotAlive – fráze botů (čeština)
#
#  Jak přeložit do dalšího jazyka:
#    1. Zkopírujte tento soubor jako plugins/BotAlive/lang/<kód>.yml
#       (např. de.yml) a přeložte obsah.
#    2. V config.yml nastavte chat.language: <kód>.
#  Kategorie, kterou soubor nedefinuje (nebo nechá prázdnou), automaticky
#  spadne na vestavěnou vrstvu – neúplný překlad botům nevezme řeč.
#
#  {name} se nahradí jménem protistrany (může zůstat prázdné).
#  {name:2} až {name:7} doplní jméno ve skloněném pádu (české číslování,
#  {name:5} = oslovení: "ahoj Karle", "čau Lucko"). Herní nicky se skloňují
#  přes čitelné jádro (Xx_Ninja_xX → "čau Ninjo"); když si engine není
#  jistý, nechá jméno beze změny.
#  patterns.* jsou regulární výrazy (case-insensitive, plný Unicode) pro
#  rozpoznání pozdravu/poděkování v příchozích zprávách.
# ============================================================================

patterns:
  greeting: '\b(ahoj|ahojky|čau|cau|čauky|čus|nazdar|zdar|dobrej|hi|hello|hey)\b'
  thanks: '\b(díky|dík|diky|dikec|thx|thanks|dekuju|děkuju|děkuji)\b'
  what-doing: 'co\s+(teď\s+|ted\s+|to\s+)?(děláš|delas|děláte|delate|robíš|robis)|čím\s+se\s+zabýváš|cim\s+se\s+zabyvas'
  where-are-you: 'kde\s+(jsi|ses|seš|jseš)|kde\s+tě\s+najdu|kde\s+te\s+najdu'
  what-have: 'co\s+(máš|mas)(\s+u\s+sebe|\s+v\s+batohu|\s+s\s+sebou)?|co\s+neseš|co\s+nesete'
  where-village: 'kde\s+je\s+(nejbližší\s+|nejblizsi\s+)?vesnice|nevíš\s+o\s+vesnici|nevis\s+o\s+vesnici'
  come-here: 'pojď\s+(sem|ke\s+mně|za\s+mnou)|pod\s+(sem|za\s+mnou|ke\s+mne)|následuj\s+mě|nasleduj\s+me'
  give-food: 'dej\s+mi\s+(něco\s+k\s+jídlu|neco\s+k\s+jidlu|jídlo|jidlo|najíst|najist)|hoď\s+mi\s+(jídlo|jidlo|žrádlo|zradlo)'
  help: '\b(pomoc|pomozte|pomoz\s+mi|pomůžeš|pomuzes|zachraň(te)?\s+mě|zachran(te)?\s+me|help(\s+me)?|sos)\b'
  give-item: '\b(dej|dáš|das|hoď|hod|hodíš|hodis|půjč|pujc)\s+(mi|mně|mne)\b|\bmáš\s+(nějak|prosím|náhradní)|\bmas\s+(nejak|prosim|nahradni)|\bpotřebuju\b|\bpotrebuju\b|\bnemáš\s+navíc\b|\bnemas\s+navic\b'
  market-buy: '\b(beru|koupím|koupim|kupuju|kupuji|vezmu\s+(to|si\s+to)|chci\s+(to\s+)?koupit)\b'

# Aliasy itemů pro prosby „dej mi …" – klíč je slovo ze zprávy (malými písmeny,
# bez diakritiky), hodnota seznam materiálů, které bot smí darovat. Doplněním
# aliasu naučíte boty rozumět dalším věcem.
