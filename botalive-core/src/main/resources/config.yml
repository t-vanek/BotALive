# ============================================================================
#  BotAlive – konfigurace
#  Plně autonomní AI hráči připojující se jako skuteční Minecraft klienti.
# ============================================================================

network:
  # Kam se boti připojují. Výchozí: tento server (loopback).
  host: "127.0.0.1"
  # 0 = převzít port běžícího serveru.
  port: 0
  connect-timeout-ms: 10000
  # Zdroj geometrie světa pro AI:
  #   server = chunk snapshoty hostitelského serveru (výchozí, nejlevnější)
  #   packet = klientský world model parsovaný z chunk paketů – NUTNÉ, pokud
  #            boti hrají na cizím serveru (host mimo tento server). Crafting,
  #            truhly, pec, obchod i enchant pak běží paketově (container
  #            kliky) – plný survival; neaktivní zůstává jen teleport API
  #            a ochočování (vyžadují server-side ověření).
  world-model: server
  # Před připojením ověřit kompatibilitu verzí: boti mluví pevnou verzí
  # protokolu; běží-li server na jiné verzi, musí překládat ViaVersion
  # (server starší než boti), příp. ViaVersion + ViaBackwards (server novější).
  # Při chybějícím překladu se vytvoření bota odmítne s vysvětlením.
  # false = jen varovat v logu a nechat login selhat (exotická setups).
  version-check: true
  reconnect:
    enabled: true
    delay-min-ms: 3000
    delay-max-ms: 15000
    max-attempts: 10

# ----------------------------------------------------------------------------
#  Gateway a ověřování botů (ochrana proti zneužití)
# ----------------------------------------------------------------------------
# Na offline-mode serveru se kdokoli může připojit pod libovolným jménem –
# včetně jmen vašich botů. Gateway to řeší vlastním ověřovacím procesem:
# BotAlive každému botu vydá krátkodobé podepsané pověření a server-side
# pojistka odmítne přihlášení pod jménem bota bez platného ověření.
gateway:
  # Hlavní vypínač. Vypnuté = chování jako dřív (žádné ověřování).
  enabled: true
  # Odmítat přihlášení pod jménem spravovaného bota bez platné čekající
  # autorizace vydané BotAlive těsně před připojením daného bota. Přihlášení
  # hráčů s vlastními jmény se nedotýká. Pojistka je fail-open: neočekávaná
  # chyba přihlášení nikdy nerozbije (jen zaloguje) – odmítá se jen zjevné
  # zneužití identity. Když vám ověřování brání v legitimním připojení, dejte
  # false.
  enforce-prelogin: true
  # Navíc vyžadovat, aby přihlášení pod jménem bota přišlo z lokálního zdroje
  # (loopback/LAN). Veřejné internetové adresy = typický vektor zneužití.
  # Vypněte, pokud boti míří na server přes veřejnou IP.
  restrict-source: true
  # Platnost vydaného pověření (s). Bot se připojí ihned po vydání, takže
  # krátká hodnota stačí; delší přidá rezervu pomalým handshakům.
  token-ttl-seconds: 120
  # Sdílený tajný klíč HMAC. Prázdné = vygenerovat a uložit do
  # plugins/BotAlive/gateway-secret.key. Vyplňte stejným klíčem na více
  # serverech, pokud sdílejí fleet botů a jednu online-mode gateway.
  secret: ""
  # Vestavěná HTTP gateway ve tvaru Mojang session API (join/hasJoined/profile).
  # Potřeba jen pro POKROČILÁ nasazení: online-mode server nebo proxy
  # nasměrované na tuto gateway (session host), případně ověřování z jiných
  # strojů. Pro běžný offline server ji nechte vypnutou – chrání i bez ní.
  http:
    enabled: false
    bind: "127.0.0.1"
    port: 41000
  # Boti se ověřují ONLINE-MODE proti gateway (ne proti Mojangu). Vyžaduje:
  # (1) online-mode server, (2) session host serveru nasměrovaný na tuto
  # gateway, např. -Dminecraft.api.session.host=http://127.0.0.1:41000,
  # (3) http.enabled: true. Pokročilé – pro běžný offline server nechte false.
  client-auth: false

bots:
  # Tvrdý strop počtu botů.
  max-count: 50
  # Vlastní pool jmen (prázdné = vestavěný seznam). Když je vyplněný, použije
  # se doslova a volba name-style se ignoruje.
  name-pool: []
  # Styl generovaných jmen (jen pro vestavěný pool):
  #   mixed = reálná jména i herní nicky (výchozí, vypadá jako běžný server)
  #   real  = jen reálná křestní jména (Martin, Lucka, …)
  #   gamer = jen herní přezdívky (xX_Reaper_Xx, ShadowWolf42, iSn1per, …)
  name-style: mixed
  # Nové boty obsadit profesí podle osobnosti (stavitel, kopáč, dřevorubec,
  # lovec, kovář, enchanter, obchodník, rybář, farmář). Role násobí priority
  # souvisejících činností; /botalive role ji umí kdykoli změnit.
  random-roles: true
  auto-spawn:
    enabled: false
    count: 3
    delay-seconds: 10

ai:
  # Jak často mozek přehodnocuje cíle (v ticích, 5 = 4× za sekundu).
  decision-interval-ticks: 5
  # Bonus aktivního cíle proti kmitání rozhodování (1.15 = +15 %).
  goal-hysteresis: 1.15
  # Dohled botů na entity (bloky).
  view-distance-blocks: 32
  # easy | normal | hard | nightmare – přesnost a reakce v boji.
  difficulty: normal
  # Smí boti měnit terén? Razí štoly a schodiště za rudou (bezpečně: nikdy
  # kolmo dolů, kontrola lávy/vody) a upravují staveniště domů.
  # false = jen povrchová těžba a žádné stavební úpravy terénu.
  terraforming: true
  # Smí boti stavět žebříky? Když navigace narazí na svislou stěnu vyšší než
  # skok (víc než 1 blok) a bot má v inventáři žebříky, přilepí je na stěnu
  # a přeleze ji – místo hloubení schodiště. Vyžaduje terraforming: true.
  ladders: true
  # Smí se boti pilířovat vzhůru? Když cíl leží výš a před botem není stěna
  # na žebřík (převis, útes, plošina), skáče a pokládá bloky pod sebe –
  # klasický „pillar up". Vyžaduje terraforming: true.
  pillaring: true
  # Smí boti použít loď k překonání vody? Když navigace míří přes souvislou
  # vodní plochu širší než pár bloků a bot má loď (v inventáři nebo poblíž
  # na hladině), nasedne a přepluje ji – místo pomalého plavání. U břehu
  # vysedne a pokračuje pěšky. Nevyžaduje terraforming (loď nemění terén).
  boats: true
  # Denní rytmus: ráno pole a výroba, přes den těžba a stavba, večer družení
  # a úklid, v noci domů. Každý bot má osobní posun (skřivan/sova) podle
  # povahy. Jemné násobiče – osobnost a profese zůstávají hlavní.
  daily-rhythm: true
  # Nouzové chování: hladový bot bez jídla a prostředků si „půjčí" z cizí
  # truhly (pár jídel, nástroj, trocha materiálu) a v krajní nouzi přepadne
  # okolního hráče/bota kvůli kořisti. Přepadení VŽDY respektuje sekci pvp
  # (enabled / attack-players / attack-bots + férovostní stropy).
  desperation: true

chat:
  enabled: true
  # Jazyk frází botů: kód souboru plugins/BotAlive/lang/<kód>.yml.
  # Vestavěné jazyky: cs (čeština), en (angličtina). Vlastní překlad:
  # zkopírujte cs.yml/en.yml na nový kód (třeba de.yml), přeložte a nastavte
  # ho sem. Neúplný překlad spadne po kategoriích na vestavěnou češtinu.
  language: cs
  # Základní šance odpovědět na zmínku jména (násobí se povahou bota).
  reply-chance: 0.75
  # Průměrná rychlost psaní (slova/min); každý bot má vlastní odchylku.
  words-per-minute: 160
  # Strop rozepsaných odpovědí (ochrana proti spamu).
  max-queued-replies: 2

combat:
  enabled: true
  # Rozsah lidské reakce na nový cíl (ms).
  reaction-min-ms: 150
  reaction-max-ms: 450
  strafing: true
  shield-use: true
  # Ofenzivní splash lektvary: bot v boji hodí po cíli lektvar zranění nebo
  # jedu (z vaření, barteru či kořisti). Na nemrtvé se nehází nikdy – zranění
  # je léčí a jed na ně nefunguje. Házení je vzácné a řídí ho inteligence
  # a agresivita povahy; splash pod vlastní nohy (záchrana) funguje vždy.
  splash-potions: true

economy:
  enabled: true
  starting-balance: 100.0
  # Napojení na serverovou ekonomiku přes Vault: je-li nainstalovaný Vault
  # a ekonomický plugin (EssentialsX, CMI...), peníze botů žijí ve stejné
  # ekonomice jako hráčům (/pay botovi funguje, /baltop je vidí).
  # false = vždy interní peněženka v databázi BotAlive.
  vault: true
  # Trh mezi boty: přebytky (jídlo, uhlí, železo) se vyvolávají v chatu,
  # zájemce si nabídku zamluví, dojde si pro zboží a při předávce se
  # převedou peníze (kamarádi mají slevu). Peníze tak obíhají uvnitř
  # společenství a profese dostávají ekonomický smysl.
  bot-trade: true
  # Prodej hráčům: když bot vyvolává nabídku, skutečný hráč odpoví „beru"
  # nebo „koupím", bot mu nabídku zamluví, řekne si o peníze přes /pay
  # (příchozí platbu ověří na svém účtu) a zboží mu předá. Kamarádi mají
  # slevu jako boti. Vyžaduje Vault ekonomiku – bez ní se prodej hráčům
  # sám vypne (interní peněženka neumí přijmout /pay).
  player-trade: true

  # Najímání botů hráči (/botalive hire <bot> <worker|guard> [dny]).
  # Dělník (worker) se soustředí na produktivní práci a výtěžek pravidelně
  # nosí zaměstnavateli; bodyguard (guard) chodí s hráčem a brání ho před
  # moby (na hráče a boty sahá jen v mezích sekce pvp). Mzdu si bot řekne
  # podle povahy – lakomí a líní jsou dražší, kamarádi mají slevu – a platí
  # se předem přes /pay. Zaměstnavatel, který svého bota napadne, o něj
  # přijde bez náhrady (a bot si to pamatuje).
  employment:
    enabled: true
    # Vyžadovat platbu předem přes Vault /pay. Vypnuto = boti pracují
    # zadarmo „za kamarádství" (servery bez ekonomiky).
    require-payment: true
    # Kolik botů smí mít jeden hráč najato současně.
    max-bots-per-player: 2
    # Strop délky smlouvy ve dnech (reálný čas).
    max-days: 7
    # Základní denní mzdy před úpravou povahou a kamarádskou slevou.
    worker-wage-per-day: 12.0
    guard-wage-per-day: 18.0

memory:
  # Časový rozpad vztahů: přátelství i zášť bez kontaktu slábnou. Bez
  # rozpadu vztahy jen rostou (+0.05 za interakci) – po pár týdnech provozu
  # by byl každý kamarádem každého (PvP asistence svolá půl serveru, trh
  # dává slevu všem) a stará zášť by blokovala vstupy do vesnic navěky.
  # Oživení vztahu (interakce) vychází z rozpadlé hodnoty – vztahy je
  # potřeba udržovat.
  relation-decay:
    enabled: true
    # O kolik denně klesá důležitost neoživovaného přátelství (FRIEND).
    friend-per-day: 0.01
    # Zášť se hojí rychleji – čas rány zaceluje (ENEMY). Krádež (0.8) tak
    # přestane blokovat vstup do vesnice (práh 0.6) zhruba po týdnu.
    enemy-per-day: 0.03
    # Podlaha rozpadu: pod tuhle důležitost vztah nikdy neklesne
    # (vzpomínka zůstává, jen už nic neovlivňuje).
    floor: 0.1

worlds:
  # Povolené světy pro boty (prázdné = všechny kromě blacklistu).
  whitelist: []
  blacklist: []

spawn:
  # world-spawn = nechá spawn na serveru | fixed = pevná pozice | random-around = náhodně kolem bodu
  mode: world-spawn
  world: ""
  x: 0
  y: 64
  z: 0
  radius: 64

pvp:
  # PvP botů. Vypnuto = boti hráče ani jiné boty nikdy nenapadají (PvE zůstává).
  enabled: false
  # Smí boti sami INICIOVAT útok na skutečné hráče? Obrana po napadení
  # funguje vždy, když je pvp zapnuté.
  attack-players: false
  attack-bots: true
  # Spojenci (přátelství z paměti botů) si přijdou na pomoc.
  help-allies: true
  help-radius: 24
  # Férovost: kolik botů smí najednou útočit na jeden cíl.
  max-attackers-per-target: 2

teleport:
  # Teleportace hráčů k botům (/botalive tp <bot>) a přivolávání botů
  # (/botalive tp <bot> here). Práva: botalive.teleport (k botovi),
  # botalive.teleport.summon (bot ke mně); botalive.admin vždy a bez cooldownu.
  enabled: true
  player-cooldown-seconds: 30

settlement:
  # Vesnice botů: domy se nestaví náhodně po krajině, ale na parcelách kolem
  # návsi. Kdo je aspoň trochu společenský, přidá se k vesnici kamarádů
  # (nebo první založí); parcely rostou v prstencích od návsi a domy koukají
  # dveřmi ke středu. Samotáři (nízká SOCIABILITY) dál staví po svém, jen ne
  # cizí vesnici pod okny. Soužití má i stinné stránky: čerstvá zášť vůči
  # sousedovi (krádež, potyčka) umí bota vyhnat – odejde a založí si vlastní
  # vesnici kus dál; nejlepší kamarádi se za ním časem stěhují (aliance).
  # false = každý staví sám jako dřív.
  enabled: true
  # Rozestup parcel v mřížce vesnice (bloky; dům má 4×4).
  plot-spacing: 12
  # Kapacita vesnice – plná vesnice nové členy nebere.
  max-members: 8
  # Jak daleko bot hledá vesnici, ke které by se přidal (bloky).
  join-radius: 200
  # Minimální vzdálenost mezi vesnicemi – odštěpenci zakládají až za ní.
  min-village-distance: 150
  # Pod tímto rysem SOCIABILITY je bot samotář a vesnice neřeší.
  loner-sociability: 0.30
  # Důležitost nepřátelské vzpomínky na souseda, která se počítá jako vážná
  # zášť (krádež z truhly ~0.8, rvačka ~0.4–1.0 podle poškození).
  grudge-threshold: 0.60
  # Nejkratší rozestup mezi stěhováními jednoho bota (minuty); roztržka smí dřív.
  change-cooldown-minutes: 30
  # Po dostavění domu osvětlit pochodněmi linii ke návsi (méně mobů v noci).
  lighting: true
  # Udusat lopatou cestičku od dveří k návsi (vesnice vypadá jako vesnice).
  paths: true
  # Po kolika dnech bez připojení se člen vesnice při startu serveru vyřadí
  # a uvolní parcelu (bot odstraněný bez purge; jeho dům ve vesnici zůstává).
  # 0 = duchové se nevymetají nikdy.
  ghost-days: 7
  # Jak čerstvá (hodiny) musí být zášť vůči sousedovi, aby kvůli ní bot
  # opustil vesnici. Starší křivdy doutnají v PvP paměti, ale nestěhuje se.
  grudge-window-hours: 2

  # Války a diplomacie mezi vesnicemi. Křivdy mezi členy různých vesnic
  # (odhalené krádeže, napadení) zvedají napětí; když přeteče práh a starosta
  # má bojovnou povahu, vyhlásí válku. Války znamenají nájezdy na cizí náves,
  # obranu svolává stávající PvP mašinerie a padlí zvyšují únavu z války,
  # dokud starostové nedojednají příměří (poražený platí reparace).
  # Vše je čistě mezi boty – hráčů se války nikdy netýkají. Nájezdy respektují
  # sekci pvp: bez pvp.enabled a pvp.attack-bots se válčí jen "studeně"
  # (napětí a vyhlášení, ale žádné boje).
  war:
    # Hlavní vypínač válek (vypnuto = napětí se neměří, nic se nevyhlašuje).
    enabled: false
    # Napětí, při kterém starosta zvažuje vyhlášení války.
    declare-threshold: 6.0
    # Napětí za odhalenou krádež mezi vesnicemi.
    theft-weight: 1.5
    # Napětí za napadení člena cizí vesnice.
    assault-weight: 0.75
    # Samovolný pokles napětí za hodinu klidu (staré křivdy blednou).
    decay-per-hour: 0.5
    # Minimální počet členů obou vesnic – malé osady války nevedou.
    min-members: 3
    # Kolik nejbojovnějších členů vyráží na jeden nájezd.
    raid-size: 3
    # Rozestup nájezdů jedné války (minuty).
    raid-cooldown-minutes: 20
    # Padlí na vlastní straně, po kterých starosta žádá o příměří.
    weariness-deaths: 4
    # Tvrdý strop délky války (hodiny) – pak se uzavře příměří tak jako tak.
    max-war-hours: 6
    # Délka příměří (hodiny). Napětí mezitím dál klesá.
    truce-hours: 12
    # Poražená strana (více padlých) platí při příměří reparace
    # z peněženky starosty vítězi.
    reparations: true
    # Strop reparací (interní měna / Vault).
    reparations-max: 40.0

nether:
  # Výpravy do Netheru: bot s výbavou si postaví (nebo najde) portál, projde
  # jím, v Netheru těží quartz, nether zlato, glowstone a starodávné trosky
  # a s kořistí se vrací domů. Z trosek se taví netheritové úlomky, s nimi
  # a zlatem vzniká netheritový ingot a u kovářského stolu (s šablonou
  # z bastionu) povýší diamantová výbava na netheritovou.
  # false = boti do Netheru sami nechodí (portály dál obcházejí obloukem).
  enabled: true
  # Smí si boti stavět vlastní portály (14 obsidiánu + křesadlo)?
  # false = používají jen portály, které ve světě najdou nebo si pamatují.
  build-portals: true
  # Výměnný obchod s pigliny: bot se zlatým kusem zbroje jim hází zlaté
  # ingoty a sbírá, co za ně padne (obsidián, gravel, občas i vzácnosti).
  barter: true
  # Časový rozpočet jedné výpravy (minuty) – pak se bot vrací k portálu.
  max-trip-minutes: 20
  # Minimální tier zbraně a zbroje pro výpravu (4 = železo, 5 = diamant).
  # S horší výbavou se do pekla nechodí.
  min-gear-tier: 4
  # Jízda na striderech: bot se sedlem (kořist z pevností a bastionů) a houbou
  # na prutu (warped fungus + prut, houbu natrhá v pokřiveném lese) osedlá
  # stridera a přejede lávový oceán, přes který se nemostí.
  striders: true
  # Vaření lektvarů: netherová bradavice z pevností (a vlastního záhonu na
  # soul sandu u domu), varný stojan z blaze rodu a lektvary progrese –
  # odolnost ohni (magma krém), síla (blaze prach), léčení, jed (splash).
  # Palivem je blaze prach, lahve se plní u vody.
  brewing: true
  # Kotva respawnu u netherového outpostu (crying obsidián z barteru
  # + glowstone z těžby): smrt na výpravě vrací bota k portálu do Netheru,
  # ne přes půlku overworldu. Nabíjí se glowstonem (4 použití).
  respawn-anchor: true
  # Strop reaktivního mostu přes lávu (bloky). Širší lávové plochy se
  # objíždějí, s aktivní odolností ohni mostí dál, nebo přejíždějí na
  # striderovi. Zvýšení zrychlí přesuny, ale prodlouží expozici nad lávou.
  lava-bridge-limit: 12
  # Souboj s witherem – vrchol netherové progrese. Bot s dostatkem odvahy
  # nasbírá v pevnosti 3 lebky wither skeletonů, postaví daleko od portálu
  # oltář ze soul sandu, vyvolá withera a skolí ho (nether star = trofej).
  # DEFAULT VYPNUTO: exploze witheru ničí terén (byť v Netheru) – zapněte,
  # jen pokud to na svém serveru chcete.
  wither:
    enabled: false
    # Minimální odvaha (rys COURAGE 0-1) – na withera jdou jen nejodvážnější.
    min-courage: 0.75
    # Rozpočet souboje (minuty); po vyčerpání bot prchá a nechá bosse být.
    max-fight-minutes: 12

end:
  # Výpravy do dimenze End. Bot, který zná portál (prošel jím, našel ho při
  # toulkách, doslechl se o něm drby od kamaráda, nebo mu ho prozradil admin
  # přes /botalive end portal <x> <y> <z> [svět]), se s železnou výbavou,
  # jídlem, bloky a ideálně lukem vypraví za drakem: sestřelí krystaly,
  # skolí draka, nasbírá end stone a perly a výstupním portálem se vrátí
  # domů. V Endu boti nespí (postel exploduje), nestaví domy, chodí
  # s pohledem u země (endermani) a pohyb hlídá ochrana hran nad voidem.
  # false = boti výpravy neplánují (pravidla přežití v Endu platí i tak,
  # když se tam bot dostane teleportem).
  enabled: true
  # Souboj s drakem (vypnout na serverech, kde má být drak trofejí hráčů).
  dragon-fight: true
  # Cílený lov endermanů kvůli perlám (jen odvážní boti, mimo dračí souboj).
  hunt-endermen: true
  # Minimální rozestup dvou výprav jednoho bota (minuty).
  expedition-cooldown-minutes: 90
  # Minimální odvaha (rys COURAGE 0–1) pro výpravu – zbabělci nelezou do Endu.
  min-courage: 0.5
  # Rozpočet jednoho zátahu na draka (minuty). Po vyčerpání si bot dá pauzu
  # (najíst se, kořist, pokus o návrat) a k boji se vrátí – bez rozpočtu by
  # proti drakovi, kterého neumí dorazit, bojoval do smrti.
  max-fight-minutes: 15

  # Vnější ostrovy Endu (po skolení draka). Bot s dostatkem perel prohodí
  # perlu gatewayí na okraji hlavního ostrova, na vnějších ostrovech najde
  # end city, probojuje se přes shulkery (levitaci po zásahu klient poctivě
  # simuluje), vyluští truhly a z end ship sundá ELYTRY (item frame na lodi).
  # Domů se vrací zpáteční gatewayí. S elytrami pak umí slétat z výšek
  # klouzavým letem (konzervativní řízení – žádné střemhlavé nálety).
  outer:
    enabled: true
    # Časový rozpočet výpravy za gatewayí (minuty); pak návrat.
    max-trip-minutes: 25
    # Server-side hledání end city (locateNearestStructure, precedent §9).
    # Vypnuto / paketový režim: město se hledá skenem purpuru při průzkumu.
    locate-assist: true
    # Kolik perel si bot vždy nechává na zpáteční průchod gatewayí.
    pearl-reserve: 2
    # Nejdál, kam se za nalezeným městem půjde (bloky) – tvrdý strop výpravy.
    # Město uvnitř tohoto okruhu se dosáhne pěšky po ostrovech, end stone
    # lávkou přes void (void-bridge), nebo raketovým přeletem (rockets).
    max-city-distance: 400
    # Smí boti létat na elytrách (klouzavé slety z výšek).
    elytra: true
    # Rakety při letu: boost prodlužuje dolet za klouzavý poměr, umožňuje
    # start ze země a přelet voidu k městu. Rakety si bot vyrábí z papíru
    # a střelného prachu (creepeři, kořist).
    rockets: true
    # Mostění přes void: k městu v dosahu max-city-distance, ke kterému
    # nevede ostrovní cesta, se staví end stone lávka (rozpočet z inventáře,
    # end stone se těží cestou). Vypnuto = město bez cesty se vzdává.
    void-bridge: true
    # Shulker boxy: z ulit shulkerů a truhly bot skládá box, na výpravě ho
    # plní kořistí a vykopává i s obsahem (dvojnásobný náklad), doma ho
    # staví vedle vlastní truhly jako rozšíření skladu.
    shulker-boxes: true

pathfinding:
  # Rozpočet expandovaných uzlů jednoho výpočtu A*; při vyčerpání se vrací
  # nejlepší částečná cesta a bot cestou doplánuje.
  node-budget: 8000
  # Časový strop jednoho výpočtu (ms); 0 = bez limitu. Garantuje latenci
  # i v členitém terénu (voda, jeskyně), kde jsou uzly drahé – při
  # vyčerpání se vrací částečná cesta.
  time-budget-ms: 25
  # Hrubé koridory dálkových tras (A* nad povrchovými sondami): boti
  # obcházejí jezera, lávová pole a masivy, na které je přímková
  # segmentace krátká. Vypnutí vrací původní dělení po vzdušné čáře.
  far-corridor: true
  # Kopací hrany v plánu cesty: po selhání pěšího plánu se cesta přepočítá
  # se zásahy do terénu (souvislý tunel, vylámané schody) místo reaktivní
  # eskalace po jednom bloku. Jen s ai.terraforming; kopání má tekutinovou
  # pojistku a nikdy neláme bedrock, obsidián, truhly, pece ani postele.
  planned-actions: true

performance:
  # 0 = automaticky podle počtu jader.
  tick-threads: 0
  pathfinding-threads: 0
  chunk-cache:
    size: 4096
    ttl-ms: 3000
  # Perioda server-side snapshotu bota (ticky).
  server-snapshot-ticks: 10

persistence:
  # sqlite (výchozí, bez konfigurace) | postgresql
  type: sqlite
  sqlite:
    file: botalive.db
  postgresql:
    host: localhost
    port: 5432
    database: botalive
    user: botalive
    password: ""
    pool-size: 8
  # Perioda write-behind flushe (sekundy).
  flush-seconds: 15

build:
  # Rozmanité domy místo dřívějšího domku 4×4 (zapnuto). Generovaný dům
  # z místního dřeva – větší půdorys, okna, valbová střecha, stavěný
  # stejným enginem a opravovaný proti svému plánu. Vypnutí (false) vrátí
  # původní domek 4×4 (plná zpětná kompatibilita).
  complex: true
  # Šířka i hloubka půdorysu (lichá, >= 5). Malý dům (5) staví bot z jednoho
  # místa, větší (7+) z několika stanovišť po vnitřní podlaze.
  width: 7
  # Výška zdí.
  wall-height: 3
