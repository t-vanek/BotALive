name: BotAlive
version: '1.0.0'
main: dev.botalive.core.BotAlivePlugin
api-version: '26.1'
folia-supported: true
author: BotAlive
description: Plně autonomní AI hráči připojení jako skuteční klienti (MCProtocolLib).
website: https://github.com/t-vanek/BotALive

commands:
  botalive:
    description: Správa AI botů a teleportace k nim
    usage: /botalive <create|remove|tp|list|pause|resume|personality|memory|goal|stats>
    permission: botalive.use
    aliases: [ba, bots]

permissions:
  botalive.use:
    description: Základní přístup k příkazu /botalive (podpříkazy mají vlastní práva)
    default: true
  botalive.teleport:
    description: Teleport hráče k botovi (/botalive tp <bot>) a zkrácený /botalive list
    default: op
  botalive.teleport.summon:
    description: Přivolání bota k hráči (/botalive tp <bot> here)
    default: op
  botalive.admin:
    description: Plná správa botů (bez teleport cooldownu)
    default: op
    children:
      botalive.use: true
      botalive.teleport: true
      botalive.teleport.summon: true
