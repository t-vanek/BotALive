# CI: build + testy na JDK 25 (vyžadováno Paper API 26.1).
name: Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # POZOR: java-version musí ladit s 'javaVersion' v gradle/libs.versions.toml.
      # GitHub Actions neumí přečíst version catalog, takže je to jediné místo, kde se
      # verze Javy při upgradu Minecraftu mění ručně i tady. Viz docs/UPGRADING.md.
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & test
        run: ./gradlew build --no-daemon

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: BotAlive
          path: botalive-core/build/libs/BotAlive-*.jar
          if-no-files-found: error
