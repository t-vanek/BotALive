# Centrální katalog verzí závislostí projektu BotAlive.
# Jediné místo, kde se mění verze – build skripty na něj pouze odkazují.

[versions]
# --- Cílová verze Minecraftu (jediné místo pro upgrade – viz docs/UPGRADING.md) ---
# Při přechodu na novou verzi Minecraftu se mění tahle skupina „naráz":
# paper + mcprotocollib + javaVersion + paperApiVersion musí ladit dohromady.
paper = "26.1.2.build.74-stable"      # Paper API pro Minecraft 26.1 (vyžaduje Javu 25)
mcprotocollib = "26.1-1"              # MCProtocolLib – klientský Minecraft protokol 26.1
javaVersion = "25"                    # Java toolchain + cílový bytecode (Paper 26.1 běží na Javě 25).
                                      # Odsud si ho bere kořenový build.gradle.kts (toolchain i release).
paperApiVersion = "26.1"              # Hodnota api-version v plugin.yml = major.minor Minecraftu.
                                      # Musí ladit s 'paper'; plní se do plugin.yml při buildu (processResources).
hikaricp = "7.1.0"                    # JDBC connection pool
caffeine = "3.2.4"                    # In-memory cache
fastutil = "8.5.3"                    # Plné primitivní kolekce (pathfinding). MCProtocolLib
                                      # táhne jen rozsekaný com.nukkitx.fastutil bez Long2Object map.
sqlite = "3.53.2.0"                   # Výchozí embedded databáze
postgresql = "42.7.13"                # Volitelná produkční databáze
slf4j = "2.0.17"                      # Logovací fasáda (implementaci dodává server)
vaultapi = "1.7.1"                    # Vault API (ekonomika) – jen compileOnly, dodává plugin Vault
junit = "6.1.2"                       # Testovací framework

[libraries]
paper-api = { module = "io.papermc.paper:paper-api", version.ref = "paper" }
mcprotocollib = { module = "org.geysermc.mcprotocollib:protocol", version.ref = "mcprotocollib" }
hikaricp = { module = "com.zaxxer:HikariCP", version.ref = "hikaricp" }
caffeine = { module = "com.github.ben-manes.caffeine:caffeine", version.ref = "caffeine" }
fastutil = { module = "it.unimi.dsi:fastutil", version.ref = "fastutil" }
sqlite-jdbc = { module = "org.xerial:sqlite-jdbc", version.ref = "sqlite" }
postgresql = { module = "org.postgresql:postgresql", version.ref = "postgresql" }
slf4j-api = { module = "org.slf4j:slf4j-api", version.ref = "slf4j" }
vaultapi = { module = "com.github.MilkBowl:VaultAPI", version.ref = "vaultapi" }
junit-bom = { module = "org.junit:junit-bom", version.ref = "junit" }
junit-jupiter = { module = "org.junit.jupiter:junit-jupiter" }
junit-platform-launcher = { module = "org.junit.platform:junit-platform-launcher" }

[plugins]
shadow = { id = "com.gradleup.shadow", version = "9.2.2" }
